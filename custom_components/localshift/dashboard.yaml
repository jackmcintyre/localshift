# =============================================================================
# LocalShift Battery Automation Dashboard
# =============================================================================
#
# Three views:
#   - Overview: mission control — a bespoke command card (status + live flows
#     + a fused plan timeline), the decision feed, money, and quick controls.
#   - Settings: all LocalShift controls, grouped by how often you touch them.
#   - Debug:    full state dump, decision log, and slot-by-slot optimizer plan.
#
# Dashboard primarily uses entities from the localshift custom component.
# Also references entities from two other integrations — ADJUST THESE TO
# MATCH YOUR SETUP (search & replace):
#   - my_home_*  entities from the Tesla Powerwall integration (Teslemetry)
#   - 100h_*     entities from the Amber Electric YAML package
#
# No HACS cards required. The Overview uses LocalShift's own cards, shipped
# with the integration at custom_components/localshift/www/localshift-cards.js.
# Install the cards once:
#   1. Copy custom_components/localshift/www/localshift-cards.js
#      to <ha-config>/www/localshift/localshift-cards.js
#   2. Settings -> Dashboards -> Resources -> Add resource:
#        URL:  /local/localshift/localshift-cards.js
#        Type: JavaScript module
#
# Add to configuration.yaml:
#   lovelace:
#     mode: storage
#     dashboards:
#       local-shift:  # URL path requires a hyphen
#         mode: yaml
#         filename: custom_components/localshift/dashboard.yaml
#         title: LocalShift
#         icon: mdi:battery-sync
#
# =============================================================================

title: LocalShift
views:
  # ===========================================================================
  # VIEW 1: OVERVIEW — mission control
  # One bespoke command card carries the story: status + live flows + a fused
  # timeline (price bands, peak window, planned actions, SOC actual & plan).
  # Supporting cards: the decision feed ("why"), money, and quick controls.
  # Cards are defined in www/localshift-cards.js (see install note above).
  # ===========================================================================
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    type: sections
    max_columns: 2
    sections:
      - type: grid
        column_span: 2
        cards:
          # Entity ids and the peak window are configurable; defaults live in
          # www/localshift-cards.js. Example:
          #   entities:
          #     soc: sensor.my_home_percentage_charged
          #     buy_price: sensor.100h_general_price
          #   dw_start: "15:00"
          #   dw_end: "21:00"
          - type: custom:localshift-command-card
            grid_options:
              columns: full

      - type: grid
        cards:
          - type: custom:localshift-decisions-card

      - type: grid
        cards:
          - type: custom:localshift-money-card

      - type: grid
        cards:
          - type: heading
            heading: Quick Controls
            heading_style: title

          - type: tile
            entity: select.localshift_battery_mode
            name: Battery Mode
            features:
              - type: select-options

          - type: tile
            entity: number.localshift_battery_target
            name: Peak Target
            features:
              - type: numeric-input
                style: slider

          - type: button
            name: Update Forecast
            icon: mdi:refresh
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.localshift_update_forecast
            icon_height: 40px

  # ===========================================================================
  # VIEW 2: SETTINGS
  # Grouped by how often you touch them: master switches first, behaviour
  # rules next, fine-tuning numbers last. Tuning defaults are sensible —
  # most installs never need to change them.
  # ===========================================================================
  - title: Settings
    path: settings
    icon: mdi:tune
    type: sections
    max_columns: 2
    sections:
      # --- Master Switches -------------------------------------------------------
      - type: grid
        cards:
          - type: heading
            heading: Master Switches
            heading_style: title

          - type: tile
            entity: switch.localshift_automation_enabled
            name: Automation
            icon: mdi:power

          - type: tile
            entity: switch.localshift_dry_run
            name: Dry Run
            icon: mdi:test-tube
            color: amber

          - type: tile
            entity: switch.localshift_notifications_enabled
            name: Notifications
            icon: mdi:bell-outline

          - type: markdown
            content: >
              **Automation** is the master switch — off means LocalShift never
              touches the battery. **Dry run** keeps automation logic running
              but only logs what it *would* do.

      # --- Mode & Manual Actions --------------------------------------------------
      - type: grid
        cards:
          - type: heading
            heading: Mode & Manual Actions
            heading_style: title

          - type: tile
            entity: select.localshift_battery_mode
            name: Battery Mode
            features:
              - type: select-options

          - type: button
            name: Update Forecast
            icon: mdi:refresh
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.localshift_update_forecast
            icon_height: 40px

          - type: markdown
            content: >
              Setting a mode by hand is temporary — automation will take over
              again on its next cycle (turn **Automation** off first for a
              lasting override). *automatic* = let the optimizer decide ·
              *self_consumption* = solar + battery run the house ·
              *grid_charging* = charge at 3.3 kW · *boost_charging* = charge
              at 5 kW · *spike_discharge* = sell to the grid ·
              *proactive_export* = export ahead of negative feed-in prices.

      # --- Targets ----------------------------------------------------------------
      - type: grid
        cards:
          - type: heading
            heading: Targets
            heading_style: title

          - type: tile
            entity: number.localshift_battery_target
            name: Demand Window Target
            features:
              - type: numeric-input
                style: slider

          - type: tile
            entity: number.localshift_minimum_target_soc
            name: Minimum SOC
            features:
              - type: numeric-input
                style: slider

          - type: tile
            entity: select.localshift_optimization_mode
            name: Optimization Mode
            features:
              - type: select-options

          - type: markdown
            content: >
              **Demand window target** is the SOC the battery should reach
              before the evening demand window. **Minimum SOC** is the floor
              the battery won't discharge below. **Optimization mode:**
              *self_consumption* favours covering the house; *arbitrage* also
              trades on price spreads.

      # --- Charging Rules -----------------------------------------------------------
      - type: grid
        cards:
          - type: heading
            heading: Charging Rules
            heading_style: title

          - type: tile
            entity: switch.localshift_demand_window_block
            name: Block Grid Charging in Demand Window
            color: orange

          - type: tile
            entity: switch.localshift_allow_dw_entry_under_target
            name: Allow DW Entry Under Target
            color: green

          - type: tile
            entity: switch.localshift_spike_discharge_enabled
            name: Spike Discharge

          - type: tile
            entity: switch.localshift_spike_discharge_conservative
            name: Conservative Spike Discharge

          - type: tile
            entity: switch.localshift_stale_solar_conservative
            name: Stale Solar Conservative

          - type: markdown
            content: >
              **Allow DW entry under target** lets the demand window start
              below target when solar is forecast to close the gap.
              **Conservative spike discharge** keeps a dynamic reserve while
              selling. **Stale solar conservative** distrusts the solar
              forecast when Solcast data is stale or missing.

      # --- Price & Optimizer Tuning (advanced) ---------------------------------------
      - type: grid
        cards:
          - type: heading
            heading: Price & Optimizer Tuning
            heading_style: title

          - type: markdown
            content: >
              ⚙️ *Advanced — the defaults are sensible. Change one thing at a
              time and watch the plan for a day.*

          - type: tile
            entity: number.localshift_cheap_price_percentile
            name: Cheap Price Percentile
            features:
              - type: numeric-input
                style: slider

          - type: tile
            entity: number.localshift_max_pre_charge_price
            name: Max Pre-charge Price

          - type: tile
            entity: number.localshift_min_cycle_saving
            name: Min Cycle Saving

          - type: tile
            entity: number.localshift_switching_penalty
            name: Switching Penalty

          - type: tile
            entity: number.localshift_target_shortfall_penalty
            name: Shortfall Penalty

          - type: tile
            entity: number.localshift_stale_solar_confidence_ceiling
            name: Stale Solar Confidence Ceiling

          - type: markdown
            content: |
              Resulting thresholds right now:
              **Charge when below:** ${{ states('sensor.localshift_price_cheap_effective') }}/kWh · **Stop charging at:** ${{ states('sensor.localshift_price_cheap_charge_stop') }}/kWh

              **Cheap price percentile** sets where in the price forecast
              "cheap" begins. **Min cycle saving** is the $/kWh margin needed
              to justify wearing the battery. **Switching penalty** damps
              rapid mode flapping. **Shortfall penalty** controls how hard
              the optimizer pushes to hit the demand window target.

      # --- Learning System -------------------------------------------------------------
      - type: grid
        cards:
          - type: heading
            heading: Learning System
            heading_style: title

          - type: tile
            entity: switch.localshift_enable_learning
            name: Learning
            icon: mdi:brain

          - type: tile
            entity: sensor.localshift_learning_status
            name: Status

          - type: button
            name: Reset Learning Data
            icon: mdi:restore-alert
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.localshift_reset_learning
              confirmation:
                text: This wipes all learned parameters and restarts observation. Continue?
            icon_height: 40px

          - type: markdown
            content: >
              When enabled, LocalShift scores its own decisions and gradually
              tunes optimization weights. It starts in *observing* and only
              adjusts parameters once it has enough data.

      # --- Powerwall (live system) --------------------------------------------------------
      - type: grid
        cards:
          - type: heading
            heading: Powerwall
            heading_style: title

          - type: tile
            entity: select.my_home_operation_mode
            name: Operation Mode

          - type: tile
            entity: number.my_home_backup_reserve
            name: Backup Reserve
            icon: mdi:battery-lock

          - type: tile
            entity: sensor.my_home_battery_power
            name: Battery Power
            icon: mdi:battery-charging

          - type: tile
            entity: sensor.my_home_grid_power
            name: Grid Power
            icon: mdi:transmission-tower

          - type: tile
            entity: sensor.my_home_solar_power
            name: Solar Power
            icon: mdi:solar-power

          - type: markdown
            content: >
              ⚠️ LocalShift drives *operation mode* and *backup reserve* when
              automation is on — manual changes here will be overwritten on
              the next cycle.

      # --- System Health -------------------------------------------------------------------
      - type: grid
        cards:
          - type: heading
            heading: System Health
            heading_style: title

          - type: tile
            entity: sensor.localshift_integration_status
            name: Integration
            icon: mdi:heart-pulse

          - type: tile
            entity: sensor.localshift_automation_ready
            name: Automation Ready
            icon: mdi:check-circle-outline

          - type: tile
            entity: sensor.localshift_forecast_status
            name: Forecast Status
            icon: mdi:crystal-ball

          - type: tile
            entity: sensor.localshift_entity_health
            name: Entity Health
            icon: mdi:stethoscope

          - type: markdown
            content: |
              {% set errors = state_attr('sensor.localshift_entity_health', 'errors') | default([]) %}
              {% set warnings = state_attr('sensor.localshift_entity_health', 'warnings') | default([]) %}
              {% if errors | length == 0 and warnings | length == 0 %}
              ✅ No entity errors or warnings.
              {% else %}
              {% for error in errors %}
              - 🔴 {{ error }}
              {% endfor %}
              {% for warning in warnings %}
              - 🟡 {{ warning }}
              {% endfor %}
              {% endif %}

  # ===========================================================================
  # VIEW 3: DEBUG (Power User Diagnostics)
  # ===========================================================================
  - title: Debug
    path: debug
    icon: mdi:bug
    type: sections
    max_columns: 1
    sections:
      # --- Debug State Summary ---
      - type: grid
        cards:
          - type: heading
            heading: Debug State Summary
            heading_style: title

          - type: markdown
            content: >
              ```
              === DEBUG STATE SUMMARY ===

              Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}

              === CURRENT STATE ===

              Mode: {{ states('select.localshift_battery_mode') }}

              Optimization Mode: {{ states('select.localshift_optimization_mode') }}

              SOC: {{ states('sensor.my_home_percentage_charged') }}%

              Battery Power: {{ states('sensor.my_home_battery_power') }} kW

              Grid Power: {{ states('sensor.my_home_grid_power') }} kW

              Solar Power: {{ states('sensor.my_home_solar_power') }} kW

              Load Power: {{ states('sensor.my_home_load_power') }} kW

              Buy Price: ${{ states('sensor.100h_general_price') }}/kWh

              Sell Price: ${{ states('sensor.100h_feed_in_price') }}/kWh

              Price Spike: {{ states('binary_sensor.100h_price_spike') }}

              Demand Window: {{ states('binary_sensor.localshift_demand_window') }}

              === ENTITY HEALTH ===

              Integration Status: {{ states('sensor.localshift_integration_status') }}

              Entity Health: {{ states('sensor.localshift_entity_health') }}

              Automation Ready: {{ states('sensor.localshift_automation_ready') }}

              Forecast Status: {{ states('sensor.localshift_forecast_status') }}

              {% set entities = state_attr('sensor.localshift_entity_health', 'entities') | default({}) %}
              {% set errors = state_attr('sensor.localshift_entity_health', 'errors') | default([]) %}
              {% set warnings = state_attr('sensor.localshift_entity_health', 'warnings') | default([]) %}

              Errors: {{ errors | length }}
              {% for error in errors %}
                - {{ error }}
              {% endfor %}

              Warnings: {{ warnings | length }}
              {% for warning in warnings %}
                - {{ warning }}
              {% endfor %}

              Stale Entities:
              {% for name, info in entities.items() %}
              {%- if info.status == 'stale' %}
                - {{ info.entity_id }}: {{ info.error_message | default('stale') }}
              {%- endif %}
              {%- endfor %}

              Missing Entities:
              {% for name, info in entities.items() %}
              {%- if info.status == 'missing' %}
                - {{ info.entity_id }}: {{ info.error_message | default('missing') }}
              {%- endif %}
              {%- endfor %}

              === INTERNAL STATE FLAGS ===

              Manual Override: {{ states('switch.localshift_automation_enabled') == 'off' }}

              Forecast Spike Within Window: {{ states('binary_sensor.localshift_price_spike_coming') }}

              Max Forecast Price: ${{ state_attr('binary_sensor.localshift_price_spike_coming', 'max_forecast_price') | default(0) }}/kWh

              Max Buy Forecast Price: ${{ state_attr('binary_sensor.localshift_price_spike_coming', 'max_buy_forecast_price') | default(0) }}/kWh

              Discharge Forced: {{ states('binary_sensor.localshift_discharge_forced') == 'on' }}

              Charge Forced: {{ states('binary_sensor.localshift_charge_forced') == 'on' }}

              Boost Charge Active: {{ states('select.localshift_battery_mode') == 'boost_charging' }}

              Solar Can Reach Target: {{ states('binary_sensor.localshift_solar_can_reach_target') }}

              Boost Charge Needed: {{ states('binary_sensor.localshift_charge_boost_needed') }}

              Price Expensive Coming: {{ states('binary_sensor.localshift_price_expensive_coming') }}

              Excess Solar Available: {{ states('binary_sensor.localshift_excess_solar_available') }}

              Excess Solar Forecast: {{ states('sensor.localshift_excess_solar_kwh') }} kWh

              Load Shift Signal: {{ states('sensor.localshift_load_shift_signal') }}

              Tesla Override Active: {{ states('binary_sensor.localshift_tesla_override_active') }}

              Amber Demand Window: {{ states('binary_sensor.localshift_amber_demand_window') }}

              === DEBUG: MODE DECISION (from forecast_diagnostics) ===

              Mode Source: {{ state_attr('sensor.localshift_forecast_diagnostics', 'debug_mode_source') | default('unknown') }}

              Forecast Slot Found: {{ state_attr('sensor.localshift_forecast_diagnostics', 'debug_forecast_slot_found') | default(false) }}

              Forecast Slot Time: {{ state_attr('sensor.localshift_forecast_diagnostics', 'debug_forecast_slot_time') | default('-') }}

              First Forecast Slot: {{ state_attr('sensor.localshift_forecast_diagnostics', 'debug_first_forecast_slot_time') | default('-') }}

              Time Gap: {{ state_attr('sensor.localshift_forecast_diagnostics', 'debug_time_gap_seconds') | default(0) }}s

              Dry Run: {{ states('switch.localshift_dry_run') == 'on' }}

              === CONFIGURATION & THRESHOLDS ===

              Cheap Price Percentile: {{ states('number.localshift_cheap_price_percentile') }}%

              Max Pre-charge Price: ${{ states('number.localshift_max_pre_charge_price') }}/kWh

              Min Cycle Saving: ${{ states('number.localshift_min_cycle_saving') }}/kWh

              Switching Penalty: ${{ states('number.localshift_switching_penalty') }}/switch

              Target Shortfall Penalty: ${{ states('number.localshift_target_shortfall_penalty') }}/%-pt

              Stale Solar Confidence Ceiling: {{ states('number.localshift_stale_solar_confidence_ceiling') }}

              Battery Target: {{ states('number.localshift_battery_target') }}%

              Minimum Target SOC: {{ states('number.localshift_minimum_target_soc') }}%

              Target SOC Minimum (effective): {{ states('sensor.localshift_target_soc_minimum') }}%

              Effective Cheap Price: ${{ states('sensor.localshift_price_cheap_effective') }}/kWh

              Cheap Charge Stop Price: ${{ states('sensor.localshift_price_cheap_charge_stop') }}/kWh

              Solar Weighted Avg FIT: ${{ states('sensor.localshift_solar_weighted_avg_fit') }}/kWh

              Solar Remaining: {{ state_attr('sensor.localshift_solar_weighted_avg_fit', 'total_solar_remaining_kwh') | default(0) }} kWh

              === OPTIMIZER INFORMATION ===

              Optimizer Status: {{ states('sensor.localshift_optimizer_summary') }}

              Optimizer Slots: {{ states('sensor.localshift_optimizer_plan') }}

              Planner: {{ state_attr('sensor.localshift_optimizer_plan_grid', 'planner') | default('unknown') }}

              Projected Net Cost: ${{ states('sensor.localshift_optimizer_plan_grid') }}

              Projected Import: {{ state_attr('sensor.localshift_optimizer_plan_grid', 'projected_import_kwh') | default(0) }} kWh

              Projected Export: {{ state_attr('sensor.localshift_optimizer_plan_grid', 'projected_export_kwh') | default(0) }} kWh

              Terminal Shortfall: {{ state_attr('sensor.localshift_optimizer_summary', 'terminal_shortfall_pct') | default(0) }}%

              Solve Time: {{ state_attr('sensor.localshift_optimizer_summary', 'solve_time_seconds') | default(0) }}s

              Cycle ID: {{ state_attr('sensor.localshift_optimizer_summary', 'cycle_id') | default('-') }}

              Parity Completeness: {{ state_attr('sensor.localshift_optimizer_summary', 'parity_completeness_pct') | default(0) }}%

              Action Breakdown: {{ state_attr('sensor.localshift_optimizer_plan_grid', 'action_breakdown') | default({}) }}

              Computed At: {{ state_attr('sensor.localshift_optimizer_plan_detailed', 'computed_at') | default('-') }}

              Optimizer Advantage: {{ states('sensor.localshift_optimizer_advantage') }}

              === FORECAST ACCURACY ===

              Forecast Accuracy: {{ states('sensor.localshift_forecast_accuracy') }}

              Solar Forecast Accuracy: {{ states('sensor.localshift_solar_forecast_accuracy') }}%

              Extended Forecast Accuracy: {{ states('sensor.localshift_extended_forecast_accuracy') }}

              Load Deviation: {{ states('sensor.localshift_load_deviation') }}

              Decision Lag: {{ states('sensor.localshift_decision_lag') }}

              === FORECAST DIAGNOSTICS (from forecast_diagnostics sensor) ===

              Current Load: {{ state_attr('sensor.localshift_forecast_diagnostics', 'current_load_kw') | default(0) }} kW

              Recent 1hr Load: {{ state_attr('sensor.localshift_forecast_diagnostics', 'recent_load_1hr_kw') | default(0) }} kW

              Recent 1hr Statistic ID: {{ state_attr('sensor.localshift_forecast_diagnostics', 'recent_load_1hr_statistic_id') | default('') }}

              Recent 1hr Samples: {{ state_attr('sensor.localshift_forecast_diagnostics', 'recent_load_1hr_samples') | default(0) }}

              Recent 1hr Error: {{ state_attr('sensor.localshift_forecast_diagnostics', 'recent_load_1hr_last_error') | default('') }}

              Consumption Source: {{ state_attr('sensor.localshift_forecast_diagnostics', 'consumption_source') }}

              Consumption Source Counts: {{ state_attr('sensor.localshift_forecast_diagnostics', 'forecast_consumption_source_counts') | default({}) }}

              Consumption Profile Hours: {{ state_attr('sensor.localshift_forecast_diagnostics', 'consumption_profile_hours') | default(0) }}

              Consumption Fallback Hours: {{ state_attr('sensor.localshift_forecast_diagnostics', 'consumption_fallback_hours') | default(0) }}

              === DECISION LOG ===

              Latest Decision: {{ state_attr('sensor.localshift_decision_log', 'reason') | default('No decisions yet') }}

              Latest SOC: {{ state_attr('sensor.localshift_decision_log', 'soc') }}%

              Latest Buy Price: ${{ state_attr('sensor.localshift_decision_log', 'buy_price') }}/kWh

              Latest Sell Price: ${{ state_attr('sensor.localshift_decision_log', 'sell_price') }}/kWh

              Latest Timestamp: {{ state_attr('sensor.localshift_decision_log', 'timestamp') }}

              Recent History (newest first):
              {% set hist = state_attr('sensor.localshift_decision_log', 'history') or [] %}
              {% for entry in hist[-10:] | reverse %}
                - {{ entry.get('timestamp', '') }}: {{ entry.get('reason', '') }} (SOC: {{ entry.get('soc') }}%)
              {% endfor %}

              === COST TRACKING ===

              Net Cost Today: ${{ states('sensor.localshift_cost_electricity_net') }}

              Import Cost: ${{ state_attr('sensor.localshift_cost_electricity_net', 'grid_import_cost') | default(0) }}

              Export Revenue: ${{ state_attr('sensor.localshift_cost_electricity_net', 'grid_export_revenue') | default(0) }}

              Battery Savings: ${{ state_attr('sensor.localshift_cost_electricity_net', 'battery_savings') | default(0) }}

              Battery Charge Cost: ${{ state_attr('sensor.localshift_cost_electricity_net', 'battery_charge_cost') | default(0) }}

              === WEATHER CORRELATION (from forecast_diagnostics) ===

              Weather Entity: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_entity_id') | default('not configured') }}

              Current Temperature: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_temperature_current') | default('N/A') }}°C

              Weather Condition: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_condition') | default('unknown') }}

              Learning Enabled: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_learning_enabled') }}

              Confidence: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_correlation_confidence') | default('low') }}

              Total Samples: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_sample_count') | default(0) }}

              Cooling Slope: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_avg_cooling_slope') | default(0) }} kW/°C

              Heating Slope: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_avg_heating_slope') | default(0) }} kW/°C

              Average R²: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_avg_r_squared') | default(0) }}

              Adjustment Applied: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_adjustment_applied') | default(false) }}

              Temperature Forecast: {{ state_attr('sensor.localshift_forecast_diagnostics', 'weather_temperature_forecast') | default({}) }}

              === SYSTEM INFO ===

              Operation Mode: {{ states('select.my_home_operation_mode') }}

              Backup Reserve: {{ states('number.my_home_backup_reserve') }}%

              Allow Export: {{ states('select.my_home_allow_export') }}

              === LEARNING SYSTEM ===

              Learning Status: {{ states('sensor.localshift_learning_status') }}

              Decision Quality: {{ states('sensor.localshift_decision_quality') }}%

              Decisions Today: {{ state_attr('sensor.localshift_learning_status', 'total_decisions_today') | default(0) }}

              Avg Score Today: {{ state_attr('sensor.localshift_learning_status', 'avg_decision_score_today') | default(0) }}

              Avg Score 7d: {{ state_attr('sensor.localshift_learning_status', 'avg_decision_score_7d') | default(0) }}

              Cost Trend: {{ state_attr('sensor.localshift_learning_status', 'cost_trend') | default('stable') }}

              Grid Charge Efficiency: {{ state_attr('sensor.localshift_decision_quality', 'grid_charge_efficiency') | default(0) }}%

              Export Loss Ratio: {{ state_attr('sensor.localshift_decision_quality', 'export_loss_ratio') | default(0) }}%

              Unnecessary Grid Charge: {{ state_attr('sensor.localshift_decision_quality', 'unnecessary_grid_charge_kwh') | default(0) }} kWh

              Mode Durations Today: {{ state_attr('sensor.localshift_learning_status', 'mode_durations_today') | default({}) }}

              Mode Cost Attribution: {{ state_attr('sensor.localshift_learning_status', 'mode_cost_attribution') | default({}) }}

              Decision History Count: {{ states('sensor.localshift_learning_decision_history') }}

              === BINARY SENSORS SUMMARY ===

              Price Spike Coming: {{ states('binary_sensor.localshift_price_spike_coming') }}

              Discharge Forced: {{ states('binary_sensor.localshift_discharge_forced') }}

              Charge Forced: {{ states('binary_sensor.localshift_charge_forced') }}

              Charge Boost: {{ states('binary_sensor.localshift_charge_boost') }}

              Price Expensive Coming: {{ states('binary_sensor.localshift_price_expensive_coming') }}

              Solar Can Reach Target: {{ states('binary_sensor.localshift_solar_can_reach_target') }}

