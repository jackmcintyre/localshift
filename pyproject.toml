[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "amber-powerwall"
version = "0.0.1"
description = "Amber Powerwall custom component for Home Assistant"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest",
    "homeassistant",
]

[tool.setuptools.packages.find]
include = ["custom_components.amber_powerwall*"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
  "F",
  "I",
  "B",
  "UP",
]

[tool.ruff.lint.per-file-ignores]
"custom_components/amber_powerwall/*.py" = ["D"]

[tool.vulture]
min_confidence = 80
paths = ["custom_components/amber_powerwall"]
exclude = ["tests/"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
include = ["custom_components/amber_powerwall"]
exclude = [
  "**/__pycache__",
  ".git",
  ".claude",
]
reportMissingImports = false
reportMissingModuleSource = false
reportGeneralTypeIssues = false
reportCallIssue = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
