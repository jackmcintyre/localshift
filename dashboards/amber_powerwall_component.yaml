# =============================================================================
# Amber Powerwall Dashboard (Custom Component Only)
# =============================================================================
#
# Clean, user-friendly dashboard using ONLY custom component entities.
# No YAML package dependencies.
#
# Add to configuration.yaml:
#   lovelace:
#     mode: storage
#     dashboards:
#       powerwall:
#         mode: yaml
#         filename: dashboards/amber_powerwall_component.yaml
#         title: Powerwall
#         icon: mdi:battery-sync
#
# =============================================================================

title: Powerwall
views:
  - title: Powerwall
    path: powerwall
    icon: mdi:battery-sync
    cards:
      # =========================================================================
      # TOP ROW: Battery Status + Mode + Prices
      # =========================================================================
      - type: horizontal-stack
        cards:
          # Battery Gauge
          - type: gauge
            entity: sensor.my_home_percentage_charged
            name: Battery
            min: 0
            max: 100
            unit: "%"
            severity:
              green: 50
              yellow: 20
              red: 10

          # Current Mode Card
          - type: entity
            entity: sensor.amber_powerwall_active_mode
            name: Mode
            icon: mdi:battery-sync
            card_mod:
              style: |
                .entity-header { display: none; }
                .entity-content {
                  text-align: center;
                  padding: 20px;
                }
                .entity-value {
                  font-size: 24px;
                  font-weight: bold;
                }

          # Buy Price
          - type: tile
            entity: sensor.100h_general_price
            name: Buy
            icon: mdi:cart-arrow-down

          # Sell Price
          - type: tile
            entity: sensor.100h_feed_in_price
            name: Sell
            icon: mdi:cart-arrow-up

          # Price Spike Alert
          - type: tile
            entity: binary_sensor.100h_price_spike
            name: Spike
            color: red

      # =========================================================================
      # SECOND ROW: Key Status Cards
      # =========================================================================
      - type: horizontal-stack
        cards:
          # Demand Window
          - type: tile
            entity: binary_sensor.amber_powerwall_demand_window_active
            name: Demand Window
            color: orange

          # Solar On Track?
          - type: tile
            entity: binary_sensor.amber_powerwall_solar_can_reach_target
            name: Solar On Track

          # Boost Needed?
          - type: tile
            entity: binary_sensor.amber_powerwall_boost_charge_needed
            name: Boost Needed
            color: red

          # Hold Justified?
          - type: tile
            entity: binary_sensor.amber_powerwall_hold_justified
            name: Hold OK

          # Export Hold?
          - type: tile
            entity: binary_sensor.amber_powerwall_solar_export_hold_justified
            name: Export Hold
            color: amber

      # =========================================================================
      # THIRD ROW: Controls
      # =========================================================================
      - type: horizontal-stack
        cards:
          # Master Toggle
          - type: tile
            entity: switch.amber_powerwall_automation_enabled
            name: Automation
            icon: mdi:power

          # Dry Run
          - type: tile
            entity: switch.amber_powerwall_dry_run
            name: Dry Run
            icon: mdi:test-tube

          # Spike Discharge
          - type: tile
            entity: switch.amber_powerwall_spike_discharge_enabled
            name: Spike Discharge
            icon: mdi:flash-alert

          # Demand Block
          - type: tile
            entity: switch.amber_powerwall_demand_window_block
            name: Demand Block
            icon: mdi:clock-alert-outline
            color: orange

      # =========================================================================
      # FOURTH ROW: Power Flow + Solar Forecast
      # =========================================================================
      - type: horizontal-stack
        cards:
          # Power Flow (Grid, Battery, Solar)
          - type: vertical-stack
            cards:
              - type: heading
                heading: Power Flow
                heading_style: title

              - type: grid
                columns: 3
                cards:
                  - type: tile
                    entity: sensor.amber_powerwall_grid_import_power
                    name: Grid
                    icon: mdi:transmission-tower
                  - type: tile
                    entity: sensor.my_home_battery_power
                    name: Battery
                    icon: mdi:battery-charging
                  - type: tile
                    entity: sensor.my_home_solar_power
                    name: Solar
                    icon: mdi:solar-power

              - type: entity
                entity: select.my_home_operation_mode
                name: Operation

              - type: entity
                entity: number.my_home_backup_reserve
                name: Reserve

          # Solar Plan
          - type: vertical-stack
            cards:
              - type: heading
                heading: Solar Plan
                heading_style: title

              - type: markdown
                content: >
                  {% set f = 'sensor.amber_powerwall_solar_battery_forecast' %}
                  {% set target = states('number.amber_powerwall_battery_target') | int %}
                  {% set soc = states('sensor.my_home_percentage_charged') | int %}
                  {% set dw = is_state('binary_sensor.amber_powerwall_demand_window_active', 'on') %}

                  **{{ soc }}% → {{ target }}%** target

                  {% if dw %}
                  (Demand window active)
                  {% else %}
                  Hours to DW: **{{ state_attr(f, 'hours_to_target_time') | default(0) }}h**
                  {% endif %}

                  ---

                  **Forecast:**
                  - Solar: {{ state_attr(f, 'solar_before_dw_kwh') | default(0) }} kWh
                  - Usage: {{ state_attr(f, 'consumption_estimate_kwh') | default(0) }} kWh
                  - Net: {{ state_attr(f, 'net_solar_kwh') | default(0) }} kWh
                  - Deficit: {{ state_attr(f, 'deficit_kwh') | default(0) }} kWh

              - type: markdown
                content: >
                  {% set f = 'sensor.amber_powerwall_solar_battery_forecast' %}
                  {% set can = state_attr(f, 'can_reach_target') | default(true) | bool %}
                  {% set boost = state_attr(f, 'boost_needed') | default(false) | bool %}

                  {% if can %}
                  ✅ **Solar can reach target**
                  {% elif boost %}
                  ⚡ **Boost (5kW) needed**
                  {% else %}
                  ⚠️ **Grid charging may be needed**
                  {% endif %}

      # =========================================================================
      # FIFTH ROW: Cost + Thresholds
      # =========================================================================
      - type: horizontal-stack
        cards:
          # Today's Cost
          - type: vertical-stack
            cards:
              - type: heading
                heading: Today's Cost
                heading_style: title

              - type: markdown
                content: >
                  {% set c = 'sensor.amber_powerwall_net_electricity_cost_today' %}
                  **Net: ${{ states(c) }}**

                  Import: ${{ state_attr(c, 'grid_import_cost') | default(0) | round(2) }}
                  Export: ${{ state_attr(c, 'grid_export_revenue') | default(0) | round(2) }}

                  Savings: ${{ state_attr(c, 'battery_savings') | default(0) | round(2) }}
                  Charge: ${{ state_attr(c, 'battery_charge_cost') | default(0) | round(2) }}

          # Price Thresholds
          - type: vertical-stack
            cards:
              - type: heading
                heading: Thresholds
                heading_style: title

              - type: markdown
                content: >
                  **Effective: ${{ states('sensor.amber_powerwall_effective_cheap_price') }}**
                  (base: ${{ states('number.amber_powerwall_cheap_price_threshold') }})

                  Stop: ${{ states('sensor.amber_powerwall_cheap_charge_stop_price') }}

                  Max pre-charge: ${{ states('number.amber_powerwall_max_pre_charge_price') }}

                  Lookahead: {{ states('number.amber_powerwall_forecast_lookahead') }}h

              - type: markdown
                content: >
                  Target: **{{ states('number.amber_powerwall_battery_target') }}%**
                  Pre-charge SOC: {{ states('number.amber_powerwall_pre_charge_battery_threshold') }}%

      # =========================================================================
      # SIXTH ROW: Manual Actions
      # =========================================================================
      - type: horizontal-stack
        cards:
          - type: button
            name: Self Consumption
            icon: mdi:battery-sync
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_return_to_self_consumption

          - type: button
            name: Force Charge
            icon: mdi:battery-charging
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_force_charge

          - type: button
            name: Boost
            icon: mdi:battery-charging-high
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_boost_charge_5kw

          - type: button
            name: Hold
            icon: mdi:battery-lock
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_hold_battery

          - type: button
            name: Discharge
            icon: mdi:flash-alert
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_force_discharge

      # =========================================================================
      # SEVENTH ROW: Decision Log
      # =========================================================================
      - type: vertical-stack
        cards:
          - type: heading
            heading: Recent Decisions
            heading_style: title

          - type: markdown
            content: >
              {% set log = 'sensor.amber_powerwall_decision_log' %}
              {% set latest = state_attr(log, 'history') | default([]) %}

              {% if latest %}
              {% for entry in latest[-5:] | reverse %}
              **{{ entry.timestamp | truncate(16, True, '')}}**: {{ entry.reason }}
              {% endfor %}
              {% else %}
              No decisions logged yet
              {% endif %}
