# =============================================================================
# Amber Powerwall Custom Component Dashboard
# =============================================================================
#
# Dashboard primarily uses entities from the amber_powerwall custom component.
# Also references:
#   - my_home_* entities from Tesla Powerwall integration
#   - 100h_* entities from Amber Electric YAML package
#
# Add to configuration.yaml:
#   lovelace:
#     mode: storage
#     dashboards:
#       amber-powerwall:
#         mode: yaml
#         filename: dashboards/amber_powerwall_component.yaml
#         title: Powerwall
#         icon: mdi:battery-sync
#
# =============================================================================

title: Powerwall
views:
  # =============================================================================
  # VIEW 1: OVERVIEW (Main Dashboard)
  # =============================================================================
  - title: Overview
    path: overview
    icon: mdi:battery-sync
    type: sections
    max_columns: 2
    sections:
      # --- Power Flow Card ---
      - type: grid
        cards:
          - type: custom:power-flow-card-plus
            entities:
              battery:
                entity: sensor.my_home_battery_power
                state_of_charge: sensor.my_home_percentage_charged
              grid:
                entity: sensor.my_home_grid_power
                secondary_info: {}
              solar:
                entity: sensor.my_home_solar_power
                display_zero_state: true
              home:
                secondary_info: {}
                entity: sensor.my_home_load_power
            clickable_entities: true
            display_zero_lines: true
            use_new_flow_rate_model: true
            w_decimals: 0
            kw_decimals: 1
            min_flow_rate: 0.75
            max_flow_rate: 6
            max_expected_power: 2000
            min_expected_power: 0.01
            watt_threshold: 1000
            transparency_zero_lines: 0
            sort_individual_devices: false

      # --- Status ---
      - type: grid
        cards:
          - type: heading
            heading: Status
            heading_style: title

          - type: tile
            entity: sensor.amber_powerwall_active_mode
            name: Mode

          - type: gauge
            entity: sensor.my_home_percentage_charged
            name: Battery
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 10
            needle: true

          - type: tile
            entity: sensor.100h_general_price
            name: Buy Price
            icon: mdi:cart-arrow-down

          - type: tile
            entity: sensor.100h_feed_in_price
            name: Sell Price
            icon: mdi:cart-arrow-up

          - type: tile
            entity: binary_sensor.100h_price_spike
            name: Price Spike
            color: red

          - type: tile
            entity: binary_sensor.amber_powerwall_demand_window_active
            name: Demand Window
            color: orange

      # --- Battery Mode ---
      - type: grid
        cards:
          - type: heading
            heading: Battery Mode
            heading_style: title

          - type: markdown
            content: >
              {% set mode = states('sensor.amber_powerwall_active_mode') %}
              {% if mode == 'manual' %}🟠 **MANUAL OVERRIDE**
              {%- elif mode == 'spike_discharge' %}🔴 **Spike Discharge** — exporting to grid
              {%- elif mode == 'boost_charging' %}🟡 **Boost Charge (5kW)** — fast charging from grid
              {%- elif mode == 'grid_charging' %}🟢 **Grid Charge (3.3kW)** — charging from grid
              {%- elif mode == 'proactive_export' %}🟢 **Proactive Export** — exporting before negative prices
              {%- elif mode == 'demand_block' %}🟠 **Demand Block**
              {%- else %}⚪ **Self Consumption** — normal operation
              {%- endif %}

              {% if mode == 'manual' %}Manual control active
              {%- elif mode == 'demand_block' %}Protecting from grid imports
              {%- elif mode == 'spike_discharge' %}Price spike detected
              {%- elif mode in ['grid_charging', 'boost_charging'] %}Price below threshold
              {%- elif mode == 'proactive_export' %}Feed-in price going negative
              {%- endif %}

      # --- Actions ---
      - type: grid
        cards:
          - type: heading
            heading: Actions
            heading_style: title

          - type: button
            name: Self Consumption
            icon: mdi:battery-sync
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_return_to_self_consumption
            icon_height: 40px

          - type: button
            name: Force Charge
            icon: mdi:battery-charging
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_force_charge
            icon_height: 40px

          - type: button
            name: Boost Charge
            icon: mdi:battery-charging-high
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_boost_charge_5kw
            icon_height: 40px

          - type: button
            name: Force Discharge
            icon: mdi:flash-alert
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_force_discharge
            icon_height: 40px

          - type: button
            name: Update Forecast
            icon: mdi:refresh
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_update_forecast
            icon_height: 40px

      # --- Live System ---
      - type: grid
        cards:
          - type: heading
            heading: Live System
            heading_style: title

          - type: tile
            entity: select.my_home_operation_mode
            name: Operation Mode

          - type: tile
            entity: number.my_home_backup_reserve
            name: Backup Reserve
            icon: mdi:battery-lock

          - type: tile
            entity: sensor.my_home_battery_power
            name: Battery Power
            icon: mdi:battery-charging

          - type: tile
            entity: sensor.amber_powerwall_grid_import_power
            name: Grid Import
            icon: mdi:transmission-tower-import

          - type: tile
            entity: sensor.amber_powerwall_grid_export_power
            name: Grid Export
            icon: mdi:transmission-tower-export

          - type: tile
            entity: sensor.my_home_solar_power
            name: Solar Power
            icon: mdi:solar-power

      # --- Forecast ---
      - type: grid
        cards:
          - type: heading
            heading: Forecast
            heading_style: title

          - type: tile
            entity: binary_sensor.amber_powerwall_forecast_spike_within_window
            name: Spike in Window

          - type: entity
            entity: binary_sensor.amber_powerwall_forecast_spike_within_window
            attribute: max_forecast_price
            name: Max Price
            icon: mdi:arrow-up-bold
            suffix: "$/kWh"

      # --- Forecast Chart ---
      - type: grid
        cards:
          - type: custom:apexcharts-card
            header:
              title: SOC - Past 24h & Future 24h
              show: true
            chart_type: line
            graph_span: 48h
            span:
              offset: "+24h"
            series:
              - entity: sensor.my_home_percentage_charged
                name: Actual SOC
                color: "#3B82F6"
                stroke_width: 3
                curve: smooth
                type: line
                extend_to: false
              - entity: sensor.amber_powerwall_daily_forecast
                name: Planned SOC
                color: "#F59E0B"
                stroke_width: 2
                stroke_dash: 5
                type: line
                extend_to: false
                data_generator: |
                  return (entity.attributes.soc_series_15min || []).map(function(entry) {
                    return [entry[0], entry[1]];
                  });
            yaxis:
              - min: 0
                max: 100
                decimals: 0
            hours_12: false
            now:
              show: true
              label: Now
              color: "#EF4444"
            cache: true
            update_interval: "60sec"

      # --- Solar Plan ---
      - type: grid
        cards:
          - type: heading
            heading: Solar Plan
            heading_style: title

          - type: markdown
            content: >
              {% set forecast = 'sensor.amber_powerwall_solar_battery_forecast' %}
              {% set target = states('number.amber_powerwall_battery_target') | round(0) | int %}
              {% set soc = states('sensor.my_home_percentage_charged') | round(0) | int %}
              {% set dw_active = is_state('binary_sensor.amber_powerwall_demand_window_active', 'on') %}
              {% if dw_active %}
              **Demand window active**

              Battery: **{{ soc }}%** → **{{ target }}%**
              {% else %}
              **{{ soc }}%** → **{{ target }}%**
              ( deficit: {{ state_attr(forecast, 'deficit_kwh') | default(0) }}kWh )

              Solar: {{ state_attr(forecast, 'solar_before_dw_kwh') | default(0) }}kWh
              Net: {{ state_attr(forecast, 'net_solar_kwh') | default(0) }}kWh

              Hours to DW: {{ state_attr(forecast, 'hours_to_target_time') | default(0) }}h

              Threshold: ${{ states('sensor.amber_powerwall_effective_cheap_price') }}/kWh

              {% if state_attr(forecast, 'can_reach_target') | bool(true) %}
              ✅ On track
              {% elif state_attr(forecast, 'boost_needed') | bool(false) %}
              ⚡ Boost needed
              {% else %}
              ⚠️ Solar gap
              {% endif %}
              {% endif %}

          - type: tile
            entity: binary_sensor.amber_powerwall_solar_can_reach_target
            name: Solar On Track

          - type: tile
            entity: binary_sensor.amber_powerwall_boost_charge_needed
            name: Boost Needed

      # --- Cost ---
      - type: grid
        cards:
          - type: heading
            heading: Cost Today
            heading_style: title

          - type: markdown
            content: >
              {% set cost = 'sensor.amber_powerwall_net_electricity_cost_today' %}
              **Net: ${{ states(cost) }}**

              Import: ${{ state_attr(cost, 'grid_import_cost') | default(0) | round(2) }}
              Export: ${{ state_attr(cost, 'grid_export_revenue') | default(0) | round(2) }}

              Savings: ${{ state_attr(cost, 'battery_savings') | default(0) | round(2) }}
              Charge: ${{ state_attr(cost, 'battery_charge_cost') | default(0) | round(2) }}

      # --- Decision Log ---
      - type: grid
        cards:
          - type: heading
            heading: Decision Log
            heading_style: title

          - type: markdown
            content: >
              {% set log = 'sensor.amber_powerwall_decision_log' %}
              **{{ states(log) }}**

              {{ state_attr(log, 'reason') }}

              SOC: {{ state_attr(log, 'soc') }}%
              Buy: ${{ state_attr(log, 'buy_price') }}/kWh
              Sell: ${{ state_attr(log, 'sell_price') }}/kWh

  # =============================================================================
  # VIEW 2: CONTROLS
  # =============================================================================
  - title: Controls
    path: controls
    icon: mdi:tune
    type: sections
    max_columns: 2
    sections:
      # --- Automation ---
      - type: grid
        cards:
          - type: heading
            heading: Automation
            heading_style: title

          - type: tile
            entity: switch.amber_powerwall_automation_enabled
            name: Automation
            icon: mdi:power

          - type: tile
            entity: switch.amber_powerwall_dry_run
            name: Dry Run
            icon: mdi:test-tube
            color: amber

      # --- Discharge Settings ---
      - type: grid
        cards:
          - type: heading
            heading: Discharge
            heading_style: title

          - type: tile
            entity: switch.amber_powerwall_spike_discharge_enabled
            name: Spike Discharge

          - type: tile
            entity: switch.amber_powerwall_demand_window_block
            name: Demand Block
            color: orange

      # --- Price Thresholds ---
      - type: grid
        cards:
          - type: heading
            heading: Price Thresholds
            heading_style: title

          - type: tile
            entity: number.amber_powerwall_cheap_price_percentile
            name: Cheap %

          - type: tile
            entity: number.amber_powerwall_max_pre_charge_price
            name: Max Pre-charge

          - type: tile
            entity: number.amber_powerwall_price_deadband
            name: Deadband

      # --- Forecast Settings ---
      - type: grid
        cards:
          - type: heading
            heading: Forecast
            heading_style: title

          - type: tile
            entity: number.amber_powerwall_forecast_lookahead
            name: Lookahead

          - type: tile
            entity: number.amber_powerwall_pre_charge_battery_threshold
            name: Pre-charge SOC

      # --- Battery Target ---
      - type: grid
        cards:
          - type: heading
            heading: Battery
            heading_style: title

          - type: tile
            entity: number.amber_powerwall_battery_target
            name: Battery Target

          - type: tile
            entity: number.amber_powerwall_load_recent_weight
            name: Load Weight
            icon: mdi:scale-balance

  # =============================================================================
  # VIEW 3: DEBUG
  # =============================================================================
  - title: Debug
    path: debug
    icon: mdi:bug
    type: sections
    max_columns: 1
    sections:
      # --- Debug State Summary ---
      - type: grid
        cards:
          - type: heading
            heading: Debug State Summary
            heading_style: title

          - type: markdown
            content: >
              ```
              === DEBUG STATE SUMMARY ===
              Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              
              === CURRENT STATE ===
              Mode: {{ states('sensor.amber_powerwall_active_mode') }}
              SOC: {{ states('sensor.my_home_percentage_charged') }}%
              Battery Power: {{ states('sensor.my_home_battery_power') }} kW
              Grid Import: {{ states('sensor.amber_powerwall_grid_import_power') }} kW
              Grid Export: {{ states('sensor.amber_powerwall_grid_export_power') }} kW
              Solar Power: {{ states('sensor.my_home_solar_power') }} kW
              
              Buy Price: ${{ states('sensor.100h_general_price') }}/kWh
              Sell Price: ${{ states('sensor.100h_feed_in_price') }}/kWh
              Price Spike: {{ states('binary_sensor.100h_price_spike') }}
              Demand Window: {{ states('binary_sensor.amber_powerwall_demand_window_active') }}
              
              === INTERNAL STATE FLAGS ===
              Manual Override: {{ states('switch.amber_powerwall_automation_enabled') == 'off' }}
              Target Reached Today: {{ state_attr('sensor.amber_powerwall_solar_battery_forecast', 'target_reached_today') }}
              
              Forecast Spike Within Window: {{ states('binary_sensor.amber_powerwall_forecast_spike_within_window') }}
              Max Forecast Price: ${{ state_attr('binary_sensor.amber_powerwall_forecast_spike_within_window', 'max_forecast_price') | default(0) }}/kWh
              Max Buy Forecast Price: ${{ state_attr('binary_sensor.amber_powerwall_forecast_spike_within_window', 'max_buy_forecast_price') | default(0) }}/kWh
              Force Discharge Active: {{ states('sensor.amber_powerwall_active_mode') == 'force_discharge' }}
              Force Charge Active: {{ states('sensor.amber_powerwall_active_mode') == 'force_charge' }}
              Boost Charge Active: {{ states('sensor.amber_powerwall_active_mode') == 'boost_charging' }}
              Solar Can Reach Target: {{ states('binary_sensor.amber_powerwall_solar_can_reach_target') }}
              Boost Charge Needed: {{ states('binary_sensor.amber_powerwall_boost_charge_needed') }}
              
              === CONFIGURATION & THRESHOLDS ===
              Cheap Price Percentile: {{ states('number.amber_powerwall_cheap_price_percentile') }}%
              Max Pre-charge Price: ${{ states('number.amber_powerwall_max_pre_charge_price') }}/kWh
              Price Deadband: {{ states('number.amber_powerwall_price_deadband') }}
              Forecast Lookahead: {{ states('number.amber_powerwall_forecast_lookahead') }}h
              Pre-charge SOC Threshold: {{ states('number.amber_powerwall_pre_charge_battery_threshold') }}%
              Battery Target: {{ states('number.amber_powerwall_battery_target') }}%
              
              Effective Cheap Price: ${{ states('sensor.amber_powerwall_effective_cheap_price') }}/kWh
              Cheap Charge Stop Price: ${{ states('sensor.amber_powerwall_cheap_charge_stop_price') }}/kWh
              Solar Weighted Avg FIT: ${{ states('sensor.amber_powerwall_solar_weighted_avg_fit') }}/kWh
              Solar Remaining: {{ state_attr('sensor.amber_powerwall_solar_weighted_avg_fit', 'total_solar_remaining_kwh') | default(0) }} kWh
              
              === FORECAST INFORMATION ===
              Solar Battery Forecast SOC: {{ state_attr('sensor.amber_powerwall_solar_battery_forecast', 'predicted_soc') | default(0) }}%
              Forecast Deficit: {{ state_attr('sensor.amber_powerwall_solar_battery_forecast', 'deficit_kwh') | default(0) }} kWh
              Solar Before DW: {{ state_attr('sensor.amber_powerwall_solar_battery_forecast', 'solar_before_dw_kwh') | default(0) }} kWh
              Net Solar: {{ state_attr('sensor.amber_powerwall_solar_battery_forecast', 'net_solar_kwh') | default(0) }} kWh
              Hours to DW: {{ state_attr('sensor.amber_powerwall_solar_battery_forecast', 'hours_to_target_time') | default(0) }}h
              Can Reach Target: {{ state_attr('sensor.amber_powerwall_solar_battery_forecast', 'can_reach_target') | default(true) }}
              Boost Needed: {{ state_attr('sensor.amber_powerwall_solar_battery_forecast', 'boost_needed') }}
              
              Daily Forecast Entries: {{ states('sensor.amber_powerwall_daily_forecast') | int(default=0) }}
              15-min Slots: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'forecast_15min_slots') | default(0) }}
              Forecast Hourly Entries: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'forecast_hourly') | default([]) | length }}
              Solcast Today Entries: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'solcast_today_entries') | default(0) }}
              Solcast Tomorrow Entries: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'solcast_tomorrow_entries') | default(0) }}
              Current Load: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'current_load_kw') | default(0) }} kW
              Recent 1hr Load: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'recent_load_1hr_kw') | default(0) }} kW
              Recent 1hr Statistic ID: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'recent_load_1hr_statistic_id') | default('') }}
              Recent 1hr Samples: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'recent_load_1hr_samples') | default(0) }}
              Recent 1hr Error: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'recent_load_1hr_last_error') | default('') }}
              Consumption Weighting: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'consumption_weighting') | default(0) }}
              Consumption Source: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'consumption_source') }}
              Consumption Source Counts: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'forecast_consumption_source_counts') | default({}) }}
              Consumption Profile Hours: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'consumption_profile_hours') | default(0) }}
              Consumption Fallback Hours: {{ state_attr('sensor.amber_powerwall_daily_forecast', 'consumption_fallback_hours') | default(0) }}
              
              === DECISION LOG ===
              Latest Decision: {{ state_attr('sensor.amber_powerwall_decision_log', 'reason') | default('No decisions yet') }}
              Latest SOC: {{ state_attr('sensor.amber_powerwall_decision_log', 'soc') }}%
              Latest Buy Price: ${{ state_attr('sensor.amber_powerwall_decision_log', 'buy_price') }}/kWh
              Latest Sell Price: ${{ state_attr('sensor.amber_powerwall_decision_log', 'sell_price') }}/kWh
              Latest Timestamp: {{ state_attr('sensor.amber_powerwall_decision_log', 'timestamp') }}
              
              Recent History:
              {% for entry in state_attr('sensor.amber_powerwall_decision_log', 'history') | default([]) | slice(-5) %}
                - {{ entry.get('timestamp', '') }}: {{ entry.get('reason', '') }} (SOC: {{ entry.get('soc') }}%)
              {% endfor %}
              
              === COST TRACKING ===
              Net Cost Today: ${{ states('sensor.amber_powerwall_net_electricity_cost_today') }}
              Import Cost: ${{ state_attr('sensor.amber_powerwall_net_electricity_cost_today', 'grid_import_cost') | default(0) }}
              Export Revenue: ${{ state_attr('sensor.amber_powerwall_net_electricity_cost_today', 'grid_export_revenue') | default(0) }}
              Battery Savings: ${{ state_attr('sensor.amber_powerwall_net_electricity_cost_today', 'battery_savings') | default(0) }}
              Battery Charge Cost: ${{ state_attr('sensor.amber_powerwall_net_electricity_cost_today', 'battery_charge_cost') | default(0) }}
              
              === SYSTEM INFO ===
              Operation Mode: {{ states('select.my_home_operation_mode') }}
              Backup Reserve: {{ states('number.my_home_backup_reserve') }}%
              Allow Export: {{ states('select.my_home_allow_export') }}
              
              === END OF DEBUG SUMMARY ===
              ```

      # --- Daily Forecast ---
      - type: grid
        cards:
          - type: heading
            heading: 24-Hour Forecast
            heading_style: title

          - type: markdown
            content: |
              ```
              Hour  | SOC (%) | Solar (kWh) | Load (kWh) | Net (kWh) | Grid In | Grid Out | Buy ($/kWh) | Sell ($/kWh)
              ------|---------|-------------|------------|-----------|---------|----------|--------------|-------------
              {%- set general_forecast = state_attr('sensor.100h_general_forecast', 'forecasts') | default([]) %}
              {%- set feedin_forecast = state_attr('sensor.100h_feed_in_forecast', 'forecasts') | default([]) %}
              {%- for item in state_attr('sensor.amber_powerwall_daily_forecast', 'forecast_hourly') | default([]) %}
              {%- set hour = item.hour %}
              {%- set buy_price = namespace(value='-') %}
              {%- set sell_price = namespace(value='-') %}
              {%- for f in general_forecast if (f.nem_date | as_datetime).hour == hour %}
                {%- if buy_price.value == '-' %}
                  {%- set buy_price.value = "%.2f"|format(f.per_kwh) %}
                {%- endif %}
              {%- endfor %}
              {%- for f in feedin_forecast if (f.nem_date | as_datetime).hour == hour %}
                {%- if sell_price.value == '-' %}
                  {%- set sell_price.value = "%.2f"|format(f.per_kwh) %}
                {%- endif %}
              {%- endfor %}
              {{ "%02d"|format(item.hour) }}    | {{ "%.1f"|format(item.predicted_soc) }}     | {{ "%.2f"|format(item.solar_kwh) }}       | {{ "%.2f"|format(item.consumption_kwh) }}     | {{ "%.2f"|format(item.net_kwh) }}       | {{ "%.2f"|format(item.grid_import_kwh) | default(0) }}     | {{ "%.2f"|format(item.grid_export_kwh) | default(0) }}       | {{ buy_price.value }}          | {{ sell_price.value }}
              {%- endfor %}
              ```

      # --- Debug 15-min Slots ---
      - type: grid
        cards:
          - type: heading
            heading: Debug 15-min Forecast Slots
            heading_style: title

          - type: markdown
            content: |
              **Debug: Grid Import/Export Forecast (first 24 slots + hourly)**

              Total Grid Import: **{{ state_attr('sensor.amber_powerwall_daily_forecast', 'debug_total_grid_import_kwh') | default(0) }} kWh**
              Total Grid Export: **{{ state_attr('sensor.amber_powerwall_daily_forecast', 'debug_total_grid_export_kwh') | default(0) }} kWh**

              First 24 x 15-min slots (next 6 hours):

              ```
              Slot | Time  | SOC  | Solar | Load  | Net   | GridIn | GridOut | Buy   | Sell | Proactive | Export
              -----|-------|------|-------|-------|-------|--------|---------|-------|------|-----------|--------
              {%- set general_forecast = state_attr('sensor.100h_general_forecast', 'forecasts') | default([]) %}
              {%- set feedin_forecast = state_attr('sensor.100h_feed_in_forecast', 'forecasts') | default([]) %}
              {%- for slot in state_attr('sensor.amber_powerwall_daily_forecast', 'debug_15min_slots') | default([]) %}
              {%- set slot_minute = (slot.hour * 60 + slot.minute) %}
              {%- set buy_price = namespace(value='-') %}
              {%- set sell_price = namespace(value='-') %}
              {%- for f in general_forecast %}
                {%- set f_minute = (f.nem_date | as_datetime).hour * 60 + (f.nem_date | as_datetime).minute %}
                {%- if buy_price.value == '-' and (slot_minute - 30) < f_minute <= (slot_minute + 30) %}
                  {%- set buy_price.value = "%.2f"|format(f.per_kwh) %}
                {%- endif %}
              {%- endfor %}
              {%- for f in feedin_forecast %}
                {%- set f_minute = (f.nem_date | as_datetime).hour * 60 + (f.nem_date | as_datetime).minute %}
                {%- if sell_price.value == '-' and (slot_minute - 30) < f_minute <= (slot_minute + 30) %}
                  {%- set sell_price.value = "%.2f"|format(f.per_kwh) %}
                {%- endif %}
              {%- endfor %}
              {%- set proactive = 'YES' if slot.proactive_export else 'NO' %}
              {%- set export_amt = slot.export_amt if slot.export_amt > 0 else '-' %}
              {{ loop.index }}    | {{ "%02d:%02d"|format(slot.hour, slot.minute) }}  | {{ "%.1f"|format(slot.soc) }}  | {{ "%.3f"|format(slot.solar) }} | {{ "%.3f"|format(slot.load) }} | {{ "%.3f"|format(slot.net) }} | {{ "%.3f"|format(slot.grid_in) | default(0) }}    | {{ "%.3f"|format(slot.grid_out) | default(0) }}     | {{ buy_price.value }}  | {{ sell_price.value }} | {{ proactive }}       | {{ export_amt }}
              {%- endfor %}
              ```
