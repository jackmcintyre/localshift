# =============================================================================
# Amber Powerwall Automation Dashboard
# =============================================================================
#
# For use with the amber_powerwall custom component.
#
# Add to configuration.yaml:
#   lovelace:
#     mode: storage
#     dashboards:
#       lovelace-battery:
#         mode: yaml
#         filename: dashboards/amber_powerwall.yaml
#         title: Battery
#         icon: mdi:battery-sync
#
# =============================================================================

title: Powerwall Automation
views:
  - title: Battery Control
    path: battery-control
    icon: mdi:battery-sync
    type: sections
    max_columns: 2
    sections:
      # =================================================================
      # LEFT COLUMN
      # =================================================================

      # --- Status ---
      - type: grid
        cards:
          - type: heading
            heading: Status
            heading_style: title

          - type: tile
            entity: sensor.amber_powerwall_active_mode
            name: Automation Mode

          - type: gauge
            entity: sensor.my_home_percentage_charged
            name: Battery
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 10
            needle: true

          - type: tile
            entity: sensor.100h_general_price
            name: Buy Price
            icon: mdi:cart-arrow-down

          - type: tile
            entity: sensor.100h_feed_in_price
            name: Sell Price
            icon: mdi:cart-arrow-up

          - type: tile
            entity: binary_sensor.100h_price_spike
            name: Price Spike
            color: red

          - type: tile
            entity: binary_sensor.amber_powerwall_demand_window_active
            name: Demand Window
            color: orange

      # --- Controls ---
      - type: grid
        cards:
          - type: heading
            heading: Controls
            heading_style: title

          - type: tile
            entity: switch.amber_powerwall_automation_enabled
            name: Automation
            icon: mdi:power

          - type: tile
            entity: switch.amber_powerwall_dry_run
            name: Dry Run
            icon: mdi:test-tube
            color: amber

          - type: tile
            entity: switch.amber_powerwall_spike_discharge_enabled
            name: Spike Discharge

          - type: tile
            entity: switch.amber_powerwall_demand_window_block
            name: Demand Block
            color: orange

          - type: tile
            entity: number.amber_powerwall_cheap_price_threshold
            name: Cheap Price

          - type: tile
            entity: number.amber_powerwall_max_pre_charge_price
            name: Max Pre-charge

          - type: tile
            entity: number.amber_powerwall_price_deadband
            name: Deadband

          - type: tile
            entity: number.amber_powerwall_forecast_lookahead
            name: Lookahead

          - type: tile
            entity: number.amber_powerwall_pre_charge_battery_threshold
            name: Pre-charge SOC

          - type: tile
            entity: number.amber_powerwall_battery_target
            name: Battery Target

      # --- Battery Mode ---
      - type: grid
        cards:
          - type: heading
            heading: Battery Mode
            heading_style: title

          - type: markdown
            content: >
              {% set mode = states('sensor.amber_powerwall_active_mode') %}
              {% set charge_active = is_state('binary_sensor.amber_powerwall_force_charge_active', 'on') %}
              {% set boost_active = is_state('binary_sensor.amber_powerwall_boost_charge_active', 'on') %}
              {% set discharge_active = is_state('binary_sensor.amber_powerwall_force_discharge_active', 'on') %}
              {% set hold_active = is_state('binary_sensor.amber_powerwall_hold_active', 'on') %}
              {% if mode == 'manual' %}🟠 **MANUAL OVERRIDE**

              {% endif %}
              {%- if discharge_active %}🔴 **Force Discharge** — exporting to grid
              {%- elif boost_active %}🟡 **Boost Charge (5kW)** — fast charging from grid
              {%- elif charge_active %}🟢 **Force Charge (3.3kW)** — charging from grid
              {%- elif mode == 'solar_export_hold' %}🟡 **Solar Export Hold** — exporting solar at high FIT
              {%- elif hold_active %}🔵 **Hold** — battery idle, house on grid
              {%- else %}⚪ **Self Consumption** — normal operation
              {%- endif %}

              {% if mode == 'manual' %}Source: **Manual** (tap Self Consumption to release)
              {%- elif mode == 'demand_block' %}Source: **Demand window block**
              {%- elif mode == 'spike_discharge' %}Source: **Price spike automation**
              {%- elif mode in ['grid_charging', 'boost_charging'] %}Source: **Cheap price automation**
              {%- elif mode == 'solar_export_hold' %}Source: **Solar export automation** (FIT ${{ states('sensor.100h_feed_in_price') | round(2) }}, avg ${{ states('sensor.amber_powerwall_solar_weighted_avg_fit') | round(2) }})
              {%- elif mode in ['hold', 'holding_for_spike'] %}Source: **Hold automation**
              {%- else %}Source: **Automation**
              {%- endif %}

      # --- Manual Actions ---
      - type: grid
        cards:
          - type: heading
            heading: Manual Actions
            heading_style: title

          - type: button
            name: Self Consumption
            icon: mdi:battery-sync
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_return_to_self_consumption
            icon_height: 40px

          - type: button
            name: Force Charge
            icon: mdi:battery-charging
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_force_charge
            icon_height: 40px

          - type: button
            name: Boost Charge
            icon: mdi:battery-charging-high
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_boost_charge_5kw
            icon_height: 40px

          - type: button
            name: Hold Battery
            icon: mdi:battery-lock
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_hold_battery
            icon_height: 40px

          - type: button
            name: Force Discharge
            icon: mdi:flash-alert
            tap_action:
              action: perform-action
              perform_action: button.press
              target:
                entity_id: button.amber_powerwall_force_discharge
            icon_height: 40px

      # =================================================================
      # RIGHT COLUMN
      # =================================================================

      # --- Live System ---
      - type: grid
        cards:
          - type: heading
            heading: Live System
            heading_style: title

          - type: tile
            entity: select.my_home_operation_mode
            name: Operation Mode

          - type: tile
            entity: number.my_home_backup_reserve
            name: Backup Reserve
            icon: mdi:battery-lock

          - type: tile
            entity: sensor.my_home_battery_power
            name: Battery
            icon: mdi:battery-charging

          - type: tile
            entity: sensor.my_home_solar_power
            name: Solar
            icon: mdi:solar-power

          - type: tile
            entity: sensor.my_home_grid_power
            name: Grid
            icon: mdi:transmission-tower

      # --- Forecast ---
      - type: grid
        cards:
          - type: heading
            heading: Forecast
            heading_style: title

          - type: tile
            entity: binary_sensor.amber_powerwall_forecast_spike_within_window
            name: Spike in Window

          - type: tile
            entity: binary_sensor.amber_powerwall_forecast_expensive_period_coming
            name: Expensive Coming

          - type: entity
            entity: binary_sensor.amber_powerwall_forecast_spike_within_window
            attribute: max_forecast_price
            name: Max Forecast Price
            icon: mdi:arrow-up-bold
            suffix: "$/kWh"

      # --- Solar Plan ---
      - type: grid
        cards:
          - type: heading
            heading: Solar Plan
            heading_style: title

          - type: markdown
            content: >
              {% set forecast = 'sensor.amber_powerwall_solar_battery_forecast' %}
              {% set target = states('number.amber_powerwall_battery_target') | round(0) | int %}
              {% set soc = states('sensor.my_home_percentage_charged') | round(0) | int %}
              {% set mode = states('sensor.amber_powerwall_active_mode') %}
              {% set reached = state_attr('sensor.amber_powerwall_solar_battery_forecast', 'can_reach_target') | bool(false) and soc >= target %}
              {% set dw_active = is_state('binary_sensor.amber_powerwall_demand_window_active', 'on') %}
              {% if dw_active %}
              **Demand window active** — solar gap monitoring paused.

              Battery: **{{ soc }}%** | Target: **{{ target }}%**
              {% if reached %} | Target reached today{% endif %}
              {% else %}
              **Battery:** {{ soc }}% → **{{ target }}%** target
              ({{ state_attr(forecast, 'deficit_kwh') | default(0) }}kWh to fill)

              **Solar forecast:** {{ state_attr(forecast, 'solar_before_dw_kwh') | default(0) }}kWh before DW

              **Consumption est:** {{ state_attr(forecast, 'consumption_estimate_kwh') | default(0) }}kWh

              **Net solar:** {{ state_attr(forecast, 'net_solar_kwh') | default(0) }}kWh

              **Hours to DW:** {{ state_attr(forecast, 'hours_to_target_time') | default(0) }}h

              {% set effective = states('sensor.amber_powerwall_effective_cheap_price') | float(0) %}
              {% set base_price = states('number.amber_powerwall_cheap_price_threshold') | float(0) %}
              {% set elevated = effective > base_price %}
              **Threshold:** ${{ effective }}/kWh
              {%- if elevated %} (elevated from base ${{ base_price }}){% endif %}

              {% if state_attr(forecast, 'can_reach_target') | bool(true) %}
              **On track** — solar should fill the battery
              {% elif state_attr(forecast, 'boost_needed') | bool(false) %}
              **Boost needed** — 3.3kW won't close the gap, needs 5kW
              {% else %}
              **Solar gap** — may need grid top-up at cheap prices
              {% endif %}

              {% if is_state('binary_sensor.amber_powerwall_solar_export_hold_justified', 'on') %}
              **Solar export hold justified** — FIT ${{ states('sensor.100h_feed_in_price') | round(2) }}/kWh > avg ${{ states('sensor.amber_powerwall_solar_weighted_avg_fit') | round(2) }}/kWh, surplus {{ state_attr('binary_sensor.amber_powerwall_solar_export_hold_justified', 'surplus_ratio') }}x
              {% endif %}
              {% endif %}

          - type: tile
            entity: sensor.amber_powerwall_effective_cheap_price
            name: Effective Threshold

          - type: tile
            entity: binary_sensor.amber_powerwall_solar_can_reach_target
            name: Solar On Track

          - type: tile
            entity: binary_sensor.amber_powerwall_boost_charge_needed
            name: Boost Needed
            color: red

          - type: tile
            entity: number.amber_powerwall_battery_target
            name: Battery Target
            color: green

          - type: tile
            entity: binary_sensor.amber_powerwall_solar_export_hold_justified
            name: Solar Export Hold
            color: amber

      # --- Insights ---
      - type: grid
        cards:
          - type: heading
            heading: Insights
            heading_style: title

          # Today's cost summary
          - type: markdown
            content: >
              {% set cost_sensor = 'sensor.amber_powerwall_net_electricity_cost_today' %}
              {% set import_cost = state_attr(cost_sensor, 'grid_import_cost') | float(0) %}
              {% set export_rev = state_attr(cost_sensor, 'grid_export_revenue') | float(0) %}
              {% set savings = state_attr(cost_sensor, 'battery_savings') | float(0) %}
              {% set charge_cost = state_attr(cost_sensor, 'battery_charge_cost') | float(0) %}
              {% set net = states(cost_sensor) | float(0) %}
              {% set import_kwh = states('sensor.grid_import_energy_daily') | float(0) %}
              {% set export_kwh = states('sensor.grid_export_energy_daily') | float(0) %}
              {% set solar_kwh = states('sensor.solar_production_energy_daily') | float(0) %}
              **Today's Energy**

              Solar: **{{ solar_kwh | round(1) }} kWh**

              Grid import: **{{ import_kwh | round(1) }} kWh** (${{ import_cost | round(2) }})

              Grid export: **{{ export_kwh | round(1) }} kWh** (-${{ export_rev | round(2) }})

              **Net cost: ${{ net | round(2) }}**

              Battery savings: **${{ savings | round(2) }}** | Charge cost: ${{ charge_cost | round(2) }}

          # Price + Mode timeline (stacked for visual alignment)
          - type: history-graph
            hours_to_show: 24
            entities:
              - entity: sensor.100h_general_price
                name: Buy Price
              - entity: sensor.100h_feed_in_price
                name: Sell Price

          - type: history-graph
            hours_to_show: 24
            entities:
              - entity: sensor.amber_powerwall_active_mode
                name: Automation Mode

          # Latest decision with reasoning
          - type: markdown
            content: >
              {% set log = 'sensor.amber_powerwall_decision_log' %}
              **Latest Decision**

              {{ states(log) }}

              {{ state_attr(log, 'reason') }}

              SOC: {{ state_attr(log, 'soc') }}% | Buy: ${{ state_attr(log, 'buy_price') }}/kWh | Sell: ${{ state_attr(log, 'sell_price') }}/kWh
              {% if state_attr(log, 'timestamp') %}
              _{{ as_timestamp(state_attr(log, 'timestamp')) | timestamp_custom('%H:%M:%S') }}_
              {% endif %}

      # --- History ---
      - type: grid
        cards:
          - type: heading
            heading: History
            heading_style: title

          - type: history-graph
            hours_to_show: 24
            entities:
              - entity: sensor.my_home_percentage_charged
                name: SOC
              - entity: sensor.my_home_battery_power
                name: Battery
              - entity: sensor.my_home_grid_power
                name: Grid

      # --- Activity ---
      - type: grid
        cards:
          - type: heading
            heading: Activity
            heading_style: title

          - type: logbook
            hours_to_show: 24
            entities:
              - select.my_home_operation_mode
              - number.my_home_backup_reserve
              - binary_sensor.100h_price_spike
              - sensor.amber_powerwall_active_mode
              - sensor.amber_powerwall_decision_log
