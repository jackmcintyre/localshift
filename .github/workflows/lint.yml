name: Lint

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.0 vulture bandit pyright

      - name: Run ruff linting
        run: ruff check custom_components/localshift

      - name: Run ruff format check
        run: ruff format --check custom_components/localshift

      - name: Run vulture (dead code detection)
        run: vulture custom_components/localshift --min-confidence 80

      - name: Run bandit (security scan)
        run: bandit -r custom_components/localshift -x tests/

      - name: Run pyright (type checking)
        run: pyright
