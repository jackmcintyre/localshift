name: Lint

on:
  pull_request:
    branches: [main, test]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run ruff lint
        run: uv run ruff check custom_components/localshift

      - name: Run ruff format check
        run: uv run ruff format --check custom_components/localshift

      - name: Run vulture
        run: uv run vulture custom_components/localshift --min-confidence 80

      - name: Run bandit
        run: uv run bandit -r custom_components/localshift -x tests/

      - name: Run interrogate
        run: uv run interrogate custom_components/localshift --fail-under 50

      - name: Run deptry
        run: uv run deptry custom_components/localshift --ignore DEP002,DEP003 || true

      # Hybrid dead-code guardrail (issue #837). NON-BLOCKING by design:
      # it WARNS but never fails the build (exit 0 / `|| true`, like deptry)
      # so it cannot break unrelated PRs. It combines static AST references
      # with runtime coverage; in the lint job no coverage.json is present,
      # so this runs static-only and reports MEDIUM (static) findings for
      # triage. The HIGH-confidence (static + 0% runtime) signal is surfaced
      # in the test job where coverage.json exists.
      - name: Hybrid dead-code detector (warn-only)
        run: uv run python scripts/hybrid_dead_code.py --min-confidence medium || true

  pyright:
    runs-on: ubuntu-latest
    continue-on-error: true  # Pre-existing type issues - non-blocking

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run pyright
        run: npx pyright custom_components/localshift
