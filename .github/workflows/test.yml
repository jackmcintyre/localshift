name: Test

on:
  pull_request:
    branches: [main, test]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=custom_components/localshift --cov-report=json --cov-report=term-missing --tb=short -q
          if [ -f coverage.json ]; then
            CURRENT=$(python3 -c "import json; c=json.load(open('coverage.json')); print(round(c['totals']['percent_covered'], 1))")
            echo "Current coverage: ${CURRENT}%"
            # Fail if coverage drops below baseline (23%)
            if (( $(echo "$CURRENT < 23" | bc -l) )); then
              echo "❌ Coverage regression: ${CURRENT}% < 23% baseline"
              exit 1
            fi
            echo "✅ Coverage above baseline"
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7