name: Duplicate Code Check

on:
  pull_request:
    branches: [main, test]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Run jscpd
        run: npx jscpd custom_components/ --min-lines 20 --min-tokens 50 --reporters console